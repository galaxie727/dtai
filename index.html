<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>デカブサ大戦</title>
<style>
*{box-sizing:border-box}
html,body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
}
body{
  display:flex;
  justify-content:center;
}
[hidden]{display:none!important}

:root{
  --maxw:560px;
  --line:rgba(255,255,255,.12);
  --muted:rgba(255,255,255,.68);
  --btn:#fff;
  --btnText:#000;
  --panelGlow:0 8px 24px rgba(0,0,0,.35);
}

.app{
  width:100%;
  max-width:var(--maxw);
  min-height:100svh;
  padding:16px;
}
.screen{
  min-height:calc(100svh - 32px);
  display:flex;
  flex-direction:column;
}

.title{
  text-align:center;
  font-size:34px;
  font-weight:900;
  letter-spacing:.08em;
  margin-top:8px;
}
.sub{
  text-align:center;
  font-size:14px;
  color:var(--muted);
  margin-top:10px;
}
.center{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
}
.btn{
  width:100%;
  border:none;
  border-radius:14px;
  padding:16px 14px;
  font-size:18px;
  font-weight:900;
  background:var(--btn);
  color:var(--btnText);
}
.btn:active{transform:scale(.98)}
.btnGhost{
  background:#1f1f1f;
  color:#fff;
  border:1px solid var(--line);
}
.version{
  text-align:center;
  font-size:12px;
  opacity:.4;
  margin-top:12px;
}
.heroWrap{text-align:center}
.hero{
  width:min(76vw,310px);
  max-width:310px;
  opacity:.97;
  animation:float 4s ease-in-out infinite;
  filter:drop-shadow(0 8px 24px rgba(0,0,0,.45));
}
.copy{
  text-align:center;
  font-size:16px;
  opacity:.85;
  margin-bottom:22px;
}
.titleFooter{padding-bottom:10px}
@keyframes float{
  0%{transform:translateY(0)}
  50%{transform:translateY(-8px)}
  100%{transform:translateY(0)}
}

.topBar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:14px;
}
.backBtn{
  width:auto;
  min-width:92px;
  padding:12px 14px;
  font-size:14px;
  border-radius:12px;
}

.row{
  display:flex;
  gap:10px;
}
.col{min-width:0}
.leftCol{flex:1.08}
.rightCol{flex:.92}

.panel{
  background:linear-gradient(180deg,#141414,#101010);
  border:1px solid var(--line);
  border-radius:16px;
  padding:12px;
  box-shadow:var(--panelGlow);
}
.sectionTitle{
  font-size:18px;
  font-weight:900;
  margin:14px 0 10px;
}
.teamInfo{
  font-size:12px;
  color:var(--muted);
  margin-top:4px;
}

/* 編成候補 */
.pickGrid{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
}
.pickCard{
  background:#1d1d1d;
  border:1px solid var(--line);
  border-radius:16px;
  padding:12px;
  display:flex;
  flex-direction:column;
  gap:10px;
  min-height:168px;
}
.pickCard.selected{
  outline:2px solid rgba(255,255,255,.65);
}
.charTop{
  display:grid;
  grid-template-columns:104px 1fr auto;
  gap:12px;
  align-items:start;
}
.pickThumb{
  width:104px;
  height:104px;
  border-radius:14px;
  object-fit:contain;
  background:#0d0d0d;
  border:1px solid var(--line);
  display:block;
}
.charName{
  font-size:16px;
  font-weight:800;
  line-height:1.2;
  margin-top:2px;
}
.charMeta{
  font-size:12px;
  color:var(--muted);
  line-height:1.5;
}
.miniTag{
  display:inline-block;
  padding:4px 8px;
  border-radius:999px;
  font-size:11px;
  font-weight:800;
  border:1px solid var(--line);
  white-space:nowrap;
}
.attr-fire{background:rgba(255,123,123,.12)}
.attr-water{background:rgba(115,169,255,.12)}
.attr-thunder{background:rgba(255,217,94,.12)}
.pickActions{margin-top:auto}
.smallBtn{
  width:100%;
  border:none;
  border-radius:12px;
  padding:12px 10px;
  font-size:15px;
  font-weight:900;
  background:#fff;
  color:#000;
}
.smallBtn.subBtn{
  background:#242424;
  color:#fff;
  border:1px solid var(--line);
}

/* 現在の並び */
.teamList{
  display:flex;
  flex-direction:column;
  gap:8px;
}
.teamSlot{
  background:#1d1d1d;
  border:1px solid var(--line);
  border-radius:14px;
  padding:10px;
  display:grid;
  grid-template-columns:42px 54px 1fr 58px;
  gap:10px;
  align-items:center;
}
.slotNum{
  width:42px;
  height:42px;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#202020;
  border:1px solid var(--line);
  font-weight:900;
  font-size:14px;
}
.slotThumb{
  width:54px;
  height:54px;
  border-radius:12px;
  object-fit:cover;
  background:#0d0d0d;
  border:1px solid var(--line);
}
.slotMain{min-width:0}
.slotName{
  font-size:15px;
  font-weight:900;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.slotMeta{
  font-size:11px;
  color:var(--muted);
  margin-top:2px;
}
.slotEmpty{color:rgba(255,255,255,.35)}
.moveBtns{
  display:flex;
  flex-direction:column;
  gap:6px;
}
.moveBtn{
  border:none;
  border-radius:10px;
  background:#2a2a2a;
  color:#fff;
  font-weight:900;
  padding:7px 0;
  border:1px solid var(--line);
  font-size:12px;
}
.moveBtn:disabled{opacity:.28}
.removeBtn{
  margin-top:6px;
  border:none;
  border-radius:10px;
  background:#1d1d1d;
  color:#fff;
  border:1px solid var(--line);
  padding:8px 0;
  font-size:12px;
  font-weight:900;
  width:100%;
}
.bottomActions{
  margin-top:14px;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.noteBox{
  margin-top:10px;
  font-size:12px;
  color:var(--muted);
  line-height:1.65;
}
.enemyPreview{
  margin-top:10px;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:6px;
}
.enemyPreviewCard{
  background:#191919;
  border:1px solid var(--line);
  border-radius:10px;
  padding:6px;
  text-align:center;
}
.enemyPreviewCard img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  border-radius:8px;
  background:#0d0d0d;
  border:1px solid var(--line);
}
.enemyPreviewCard .n{
  font-size:10px;
  margin-top:5px;
  line-height:1.3;
}

/* メタ */
.battleMeta{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:10px;
}
.metaPill{
  padding:7px 10px;
  border-radius:999px;
  border:1px solid var(--line);
  background:#171717;
  font-size:11px;
  color:#ddd;
}
.alivePill{font-weight:900}
.aliveGood{color:#b8ffd1}
.aliveBad{color:#ffc1c1}
  /* 戦況表 */
.statusBoardWrap{
  position:relative;
  margin-bottom:12px;
}
.statusBoard{
  background:linear-gradient(180deg,#141414,#101010);
  border:1px solid var(--line);
  border-radius:16px;
  padding:12px;
  box-shadow:var(--panelGlow);
  position:relative;
  z-index:1;
}
.statusLines{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:0;
}
.statusHead{
  display:grid;
  grid-template-columns:1fr 44px 1fr;
  gap:8px;
  align-items:center;
  margin-bottom:8px;
}
.statusHead .label{
  font-size:13px;
  font-weight:900;
  color:#ddd;
}
.statusHead .label.right{
  text-align:right;
}
.statusRows{
  display:flex;
  flex-direction:column;
  gap:6px;
}
.statusRow{
  display:grid;
  grid-template-columns:1fr 44px 1fr;
  gap:8px;
  align-items:center;
}
.miniSideCard{
  background:#1a1a1a;
  border:1px solid var(--line);
  border-radius:12px;
  padding:8px;
  min-height:58px;
  display:grid;
  grid-template-columns:40px 1fr auto;
  gap:8px;
  align-items:center;
  position:relative;
}
.miniSideCard.right{
  grid-template-columns:auto 1fr 40px;
}
.miniSideCard.dead{
  opacity:.35;
  filter:grayscale(1);
}
.miniSideCard.active{
  outline:2px solid rgba(255,255,255,.55);
  box-shadow:0 0 0 3px rgba(255,255,255,.08);
}
.miniSideCard img{
  width:40px;
  height:40px;
  border-radius:10px;
  object-fit:cover;
  background:#0d0d0d;
  border:1px solid var(--line);
}
.miniSideCard.playerSide img{
  transform:scaleX(-1);
}
.miniSideCard.enemySide img{
  transform:scaleX(1);
}
.miniSideMain{min-width:0}
.miniSideName{
  font-size:12px;
  font-weight:900;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.miniSideMeta{
  font-size:10px;
  color:var(--muted);
  margin-top:2px;
}
.miniSideBadge{
  font-size:11px;
  font-weight:900;
  color:#fff;
}
.boardVs{
  display:flex;
  align-items:center;
  justify-content:center;
}
.boardLink{
  width:100%;
  height:2px;
  background:rgba(255,255,255,.18);
  position:relative;
}
.boardLink.active{
  background:rgba(255,255,255,.75);
  box-shadow:0 0 10px rgba(255,255,255,.22);
}

/* 拡大対戦 */
.battleTop{
  display:grid;
  grid-template-columns:1fr 64px 1fr;
  gap:10px;
  align-items:stretch;
  margin-bottom:10px;
}
.sideLabel{
  font-size:12px;
  color:var(--muted);
  margin-bottom:6px;
}
.vs{
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  font-weight:900;
  opacity:.95;
}

.fighterCard{
  border:1px solid var(--line);
  border-radius:18px;
  padding:14px;
  min-height:246px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  box-shadow:var(--panelGlow);
  position:relative;
  overflow:hidden;
}
.fighterCard.fire{
  background:
    radial-gradient(circle at 30% 20%, rgba(255,90,90,.20), transparent 42%),
    linear-gradient(180deg,#251313,#120d0d);
}
.fighterCard.water{
  background:
    radial-gradient(circle at 30% 20%, rgba(90,150,255,.20), transparent 42%),
    linear-gradient(180deg,#101a2a,#0c1018);
}
.fighterCard.thunder{
  background:
    radial-gradient(circle at 30% 20%, rgba(255,220,90,.18), transparent 42%),
    linear-gradient(180deg,#26210f,#13110b);
}
.fighterCard.none{
  background:linear-gradient(180deg,#171717,#101010);
}
.fighterHeader{
  display:flex;
  flex-direction:column;
  gap:6px;
  min-width:0;
}
.fighterBadges{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}
.fighterBadges.right{
  justify-content:flex-end;
}
.infoBadge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:4px 10px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.16);
  background:rgba(255,255,255,.08);
  font-size:11px;
  font-weight:900;
}
.badge-attr-fire{background:rgba(255,123,123,.12)}
.badge-attr-water{background:rgba(115,169,255,.12)}
.badge-attr-thunder{background:rgba(255,217,94,.12)}
.badge-good{background:rgba(120,225,160,.16);color:#b8ffd1}
.badge-bad{background:rgba(255,127,127,.16);color:#ffc1c1}
.badge-even{background:rgba(255,255,255,.08);color:#eee}

.fighterName{
  font-size:18px;
  font-weight:900;
  line-height:1.15;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  word-break:keep-all;
}
.fighterRole{
  font-size:13px;
  color:#b8c8ff;
  line-height:1.2;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.fighterBody{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  min-height:92px;
}
.fighterVisual{
  width:118px;
  height:92px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}
.fighterImg{
  max-width:100%;
  max-height:92px;
  object-fit:contain;
  filter:drop-shadow(0 8px 18px rgba(0,0,0,.45));
}
.fighterVisual.player .fighterImg{
  transform:scaleX(-1);
}
.fighterVisual.enemy .fighterImg{
  transform:scaleX(1);
}
.hpWrap{margin-top:8px}
.hpRow{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  margin-bottom:5px;
}
.hpBar{
  width:100%;
  height:12px;
  background:#292929;
  border-radius:999px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.08);
}
.hpFill{
  height:100%;
  width:100%;
  background:#fff;
  transition:width .28s ease;
}
.hpFill.low{background:#ff7b7b}
.hpFill.mid{background:#ffd24d}
.hpFill.high{background:#77e0a0}
  /* 演出 */
.liveTicker{
  margin:4px 0 10px;
  padding:14px 14px;
  border-radius:14px;
  background:linear-gradient(180deg,#181818,#111);
  border:1px solid rgba(255,255,255,.12);
  font-size:17px;
  font-weight:900;
  line-height:1.45;
  min-height:56px;
  display:flex;
  align-items:center;
  box-shadow:0 8px 24px rgba(0,0,0,.28);
}
.battleBubble{
  position:absolute;
  top:-4px;
  max-width:120px;
  padding:8px 10px;
  border-radius:12px;
  background:rgba(255,255,255,.96);
  color:#111;
  font-size:12px;
  font-weight:900;
  line-height:1.35;
  box-shadow:0 6px 18px rgba(0,0,0,.28);
  z-index:3;
  animation:bubblePop .45s ease;
}
.battleBubble.left{left:-2px}
.battleBubble.right{right:-2px}
.battleBubble.left::after{
  content:"";
  position:absolute;
  left:18px;
  bottom:-8px;
  border-width:8px 7px 0 7px;
  border-style:solid;
  border-color:rgba(255,255,255,.96) transparent transparent transparent;
}
.battleBubble.right::after{
  content:"";
  position:absolute;
  right:18px;
  bottom:-8px;
  border-width:8px 7px 0 7px;
  border-style:solid;
  border-color:rgba(255,255,255,.96) transparent transparent transparent;
}
@keyframes bubblePop{
  0%{opacity:0;transform:translateY(6px) scale(.92)}
  100%{opacity:1;transform:translateY(0) scale(1)}
}
.fighterCard.hit{
  animation:cardHitShake .22s ease;
}
.fighterCard.hit-enemy{
  animation:cardHitShakeEnemy .22s ease;
}
.fighterCard.flash::after{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(255,255,255,.28);
  pointer-events:none;
  animation:cardHitFlash .22s ease;
}
@keyframes cardHitShake{
  0%{transform:translateX(0)}
  20%{transform:translateX(-8px)}
  40%{transform:translateX(7px)}
  60%{transform:translateX(-5px)}
  80%{transform:translateX(3px)}
  100%{transform:translateX(0)}
}
@keyframes cardHitShakeEnemy{
  0%{transform:translateX(0)}
  20%{transform:translateX(8px)}
  40%{transform:translateX(-7px)}
  60%{transform:translateX(5px)}
  80%{transform:translateX(-3px)}
  100%{transform:translateX(0)}
}
@keyframes cardHitFlash{
  0%{opacity:0}
  25%{opacity:1}
  100%{opacity:0}
}
.hpBar.hitbar{
  box-shadow:0 0 0 2px rgba(255,255,255,.12), 0 0 16px rgba(255,255,255,.22);
}
.damageText{
  position:absolute;
  top:18px;
  left:50%;
  transform:translateX(-50%);
  font-size:24px;
  font-weight:900;
  color:#fff;
  text-shadow:0 2px 10px rgba(0,0,0,.6);
  pointer-events:none;
  z-index:4;
  animation:damagePop .7s ease forwards;
}
.damageText.crit{
  color:#ffd95e;
}
@keyframes damagePop{
  0%{opacity:0;transform:translateX(-50%) translateY(10px) scale(.7)}
  25%{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}
  100%{opacity:0;transform:translateX(-50%) translateY(-24px) scale(1.05)}
}

.logPanel{
  flex:1;
  background:#111;
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px;
  overflow:auto;
  min-height:210px;
  max-height:30svh;
}
.logLine{
  font-size:13px;
  line-height:1.65;
  padding:4px 0;
  border-bottom:1px dashed rgba(255,255,255,.06);
}
.battleActions{
  margin-top:12px;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.resultTitle{
  font-size:22px;
  font-weight:900;
  text-align:center;
  margin:8px 0 4px;
}
.resultSub{
  text-align:center;
  color:var(--muted);
  font-size:13px;
  margin-bottom:8px;
}
.summaryCard{
  background:#111;
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px;
  line-height:1.75;
  font-size:13px;
  white-space:pre-line;
}
.speedRow{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}
.speedBtn{
  flex:1;
  min-width:84px;
  border:none;
  border-radius:12px;
  padding:10px 8px;
  background:#242424;
  color:#fff;
  border:1px solid var(--line);
  font-size:12px;
  font-weight:900;
}
.speedBtn.active{
  background:#fff;
  color:#000;
}
.flashMsg{
  position:sticky;
  top:0;
  z-index:5;
  margin-bottom:10px;
  text-align:center;
  font-size:18px;
  font-weight:900;
  padding:10px 12px;
  border-radius:14px;
  background:linear-gradient(180deg,rgba(255,255,255,.16),rgba(255,255,255,.06));
  border:1px solid rgba(255,255,255,.2);
  opacity:0;
  transform:translateY(-6px) scale(.98);
  transition:.18s ease;
  pointer-events:none;
}
.flashMsg.show{
  opacity:1;
  transform:translateY(0) scale(1);
}
.replayPanel{
  background:#111;
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px;
  font-size:13px;
  line-height:1.7;
  white-space:pre-line;
}

@media (max-width:520px){
  .title{font-size:31px}
  .row{flex-direction:column}
  .statusHead{grid-template-columns:1fr 34px 1fr;gap:6px}
  .statusRow{grid-template-columns:1fr 34px 1fr;gap:6px}
  .miniSideCard{
    min-height:54px;
    grid-template-columns:36px 1fr auto;
    padding:7px;
  }
  .miniSideCard.right{
    grid-template-columns:auto 1fr 36px;
  }
  .miniSideCard img{
    width:36px;
    height:36px;
  }
  .battleTop{grid-template-columns:1fr 48px 1fr;gap:8px}
  .vs{font-size:22px}
  .enemyPreview{grid-template-columns:repeat(3,1fr)}
  .liveTicker{font-size:16px}
  .fighterCard{min-height:232px;padding:12px}
  .fighterName{font-size:16px}
  .fighterVisual{
    width:92px;
    height:84px;
  }
  .fighterImg{
    max-width:92px;
    max-height:84px;
  }
  .charTop{
    grid-template-columns:88px 1fr auto;
  }
  .pickThumb{
    width:88px;
    height:88px;
  }
}
</style>
</head>
<body>
<div class="app">

<section id="screenTitle" class="screen">
  <div class="title">デカブサ大戦</div>
  <div class="sub">5対5 オート団体戦</div>
  <div class="center">
    <div class="heroWrap">
      <img class="hero" src="./dekabusa_title.png" alt="デカブサ大戦" onerror="this.src='./dekabusa.png';this.onerror=null;">
    </div>
  </div>
  <div class="titleFooter">
    <div class="copy">並びで勝て。</div>
    <button class="btn" onclick="goBuild()">START</button>
    <div class="version">ver 4.0</div>
  </div>

}

  return "attr-thunder";
}

  if(attr === "fire") return "fire";

function randomLine(map, id, fallback){

function getChar(id){

}
function cloneFighter(char, side, orderIndex){
  return {
    ...JSON.parse(JSON.stringify(char)),
    side,
    orderIndex,
    maxHp: char.hp,
    currentHp: char.hp,
    alive: true,

  function showScreen(id){
  document.getElementById("screenTitle").hidden = true;
  document.getElementById("screenBuild").hidden = true;

  document.getElementById(id).hidden = false;

function goBuild(){

  renderAll();
}

function backToBuildFromBattle(){
  battle = null;
  showScreen("screenBuild");

/* =========================
   チーム操作
========================= */

function addToTeam(id){
  if(team.includes(id)) return;
  if(team.length >= 5){
    alert("5体までです");
    return;
  }
  team.push(id);
  renderAll();
}

function removeFromTeam(id){
  team = team.filter(v => v !== id);
  renderAll();
}

function moveUp(index){
  if(index <= 0) return;
  [team[index - 1], team[index]] = [team[index], team[index - 1]];
  renderAll();
}

function moveDown(index){
  if(index >= team.length - 1) return;
  [team[index + 1], team[index]] = [team[index], team[index + 1]];
  renderAll();
}

function clearTeam(){
  team = [];
  document.getElementById("enemyPreviewWrap").hidden = true;
  renderAll();
}

function autoFillTeam(){
  team = ["rate","namaken","ani","kabao","king"];
  document.getElementById("enemyPreviewWrap").hidden = true;
  renderAll();
}

/* =========================
   UI描画
========================= */

function renderPickGrid(){
  const el = document.getElementById("pickGrid");
  el.innerHTML = "";

  characters.forEach(ch => {
    const selected = team.includes(ch.id);

    const card = document.createElement("div");
    card.className = "pickCard" + (selected ? " selected" : "");

    card.innerHTML = `
      <div class="charTop">
        <img class="pickThumb" src="${ch.img}" alt="${ch.name}">
        <div>
          <div class="charName">${ch.name}</div>
          <div class="charMeta">${ch.role}</div>
          <div class="charMeta">HP ${ch.hp} / 攻 ${ch.atk} / 防 ${ch.def} / 速 ${ch.spd}</div>
        </div>
        <div class="miniTag ${attrClass(ch.attr)}">${attrLabel(ch.attr)}</div>
      </div>

      <div class="pickActions">
        ${selected
          ? `<button class="smallBtn subBtn" onclick="removeFromTeam('${ch.id}')">外す</button>`
          : `<button class="smallBtn" onclick="addToTeam('${ch.id}')">選ぶ</button>`}
      </div>
    `;
    el.appendChild(card);
  });
}

function renderTeamList(){
  const el = document.getElementById("teamList");
  el.innerHTML = "";

  const labels = ["先鋒","次鋒","中堅","副将","大将"];

  for(let i=0;i<5;i++){
    const id = team[i];
    const slot = document.createElement("div");
    slot.className = "teamSlot";

    if(id){
      const ch = getChar(id);
      slot.innerHTML = `
        <div class="slotNum">${labels[i]}</div>
        <img class="slotThumb" src="${ch.img}">
        <div class="slotMain">
          <div class="slotName">${ch.name}</div>
          <div class="slotMeta">${attrLabel(ch.attr)} / ${ch.role}</div>
          <button class="removeBtn" onclick="removeFromTeam('${ch.id}')">外す</button>
        </div>
        <div class="moveBtns">
          <button class="moveBtn" onclick="moveUp(${i})" ${i===0 ? "disabled":""}>▲</button>
          <button class="moveBtn" onclick="moveDown(${i})" ${i===team.length-1 ? "disabled":""}>▼</button>
        </div>
      `;
    }else{
      slot.innerHTML = `
        <div class="slotNum">${labels[i]}</div>
        <div class="slotThumb" style="opacity:.15"></div>
        <div class="slotMain">
          <div class="slotName slotEmpty">未選択</div>
        </div>
      `;
    }

    el.appendChild(slot);
  }

  document.getElementById("confirmBtn").disabled = team.length !== 5;
}

function renderAll(){
  renderPickGrid();
  renderTeamList();
}

/* =========================
   敵生成
========================= */

function shuffle(arr){
  return [...arr].sort(()=>Math.random()-0.5);
}

function makeEnemyTeam(){
  const pool = characters.map(c=>c.id).filter(id=>!team.includes(id));
  return shuffle(pool).slice(0,5);
}

/* =========================
   斜め線（重要）
========================= */

function drawStatusLines(){
  const svg = document.getElementById("statusLines");
  svg.innerHTML = "";

  const wrap = document.querySelector(".statusBoardWrap").getBoundingClientRect();

  battle.lineHistory.forEach(line=>{
    const from = document.querySelector(`.miniSideCard[data-side="player"][data-idx="${line.playerIdx}"]`);
    const to   = document.querySelector(`.miniSideCard[data-side="enemy"][data-idx="${line.enemyIdx}"]`);

    if(!from || !to) return;

    const fr = from.getBoundingClientRect();
    const tr = to.getBoundingClientRect();

    const x1 = fr.right - wrap.left;
    const y1 = fr.top + fr.height/2 - wrap.top;

    const x2 = tr.left - wrap.left;
    const y2 = tr.top + tr.height/2 - wrap.top;

    const path = document.createElementNS("http://www.w3.org/2000/svg","line");
    path.setAttribute("x1",x1);
    path.setAttribute("y1",y1);
    path.setAttribute("x2",x2);
    path.setAttribute("y2",y2);

    path.setAttribute("stroke", line.active ? "#fff" : "rgba(255,255,255,.3)");
    path.setAttribute("stroke-width", line.active ? "3" : "2");

    svg.appendChild(path);
  });
}

/* =========================
   バトル
========================= */

function startBattle(){
  if(team.length !== 5){
    alert("5体必要");
    return;
  }

  const enemy = makeEnemyTeam();

  battle = {
    playerTeam: team.map((id,i)=>({...getChar(id), currentHp:getChar(id).hp, alive:true, orderIndex:i})),
    enemyTeam: enemy.map((id,i)=>({...getChar(id), currentHp:getChar(id).hp, alive:true, orderIndex:i})),
    playerActiveIndex:0,
    enemyActiveIndex:0,
    lineHistory:[]
  };

  showScreen("screenBattle");

  battle.lineHistory.push({
    playerIdx:0,
    enemyIdx:0,
    active:true
  });

  renderBattleHeader();
}

/* ========================= */

window.addEventListener("resize",()=>{
  if(battle) drawStatusLines();
});

goTitle();
