<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>デカブサ大戦</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:sans-serif;
  display:flex;
  justify-content:center;
}
.app{max-width:560px;width:100%;padding:10px}

.screen{display:none}
.active{display:block}

.title{
  text-align:center;
  font-size:28px;
  font-weight:900;
  margin-top:40px;
}

.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  font-weight:900;
  margin-top:10px;
}

/* 編成 */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
}

.card{
  padding:10px;
  border-radius:10px;
  font-size:12px;
  font-weight:900;
}

/* 属性色 */
.fire{background:#3a1515}
.water{background:#14213a}
.thunder{background:#3a3214}
.battleTop{
  display:grid;
  grid-template-columns:1fr 60px 1fr;
  gap:10px;
}

.vs{
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  font-weight:900;
}

.fighter{
  padding:10px;
  border-radius:12px;
  position:relative;
  min-height:160px;
}

.hpBar{height:10px;background:#333;border-radius:10px;overflow:hidden}
.hpFill{height:100%;background:#7fffaa;width:100%}

/* 吹き出し */
.bubble{
  position:absolute;
  top:-10px;
  left:10px;
  background:#fff;
  color:#000;
  padding:6px 10px;
  border-radius:10px;
  font-size:12px;
  font-weight:900;
  animation:pop .2s;
}

@keyframes pop{
  0%{opacity:0;transform:scale(.7)}
  100%{opacity:1;transform:scale(1)}
}

/* 被弾 */
.hit{animation:shake .2s}
@keyframes shake{
  0%{transform:translateX(0)}
  25%{transform:translateX(-6px)}
  50%{transform:translateX(6px)}
  75%{transform:translateX(-4px)}
  100%{transform:translateX(0)}
}

.flash::after{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(255,255,255,.3);
}

/* 実況 */
.live{
  margin-top:10px;
  padding:12px;
  background:#111;
  border-radius:10px;
  font-weight:900;
}

.log{
  font-size:12px;
  opacity:.8;
  margin-top:6px;
  max-height:120px;
  overflow:auto;
}
</style>
</head>

<body>
<div class="app">

<!-- タイトル -->
<section id="title" class="screen active">
  <div class="title">デカブサ大戦</div>
  <button class="btn" onclick="goSelect()">START</button>
</section>

<!-- 編成 -->
<section id="select" class="screen">
  <div class="title">5体選択</div>
  <div id="list" class="grid"></div>
  <button class="btn" onclick="startBattle()">バトル開始</button>
</section>
<section id="battle" class="screen">

<div class="battleTop">

<div id="player" class="fighter fire">
  <div id="pbubble"></div>
  <div id="pname"></div>
  <div class="hpBar"><div id="php" class="hpFill"></div></div>
</div>

<div class="vs">VS</div>

<div id="enemy" class="fighter water">
  <div id="ebubble"></div>
  <div id="ename"></div>
  <div class="hpBar"><div id="ehp" class="hpFill"></div></div>
</div>

</div>

<div id="live" class="live">対戦開始</div>
<div id="log" class="log"></div>

</section>
<script>

const chars=[
{name:"デカブサ",hp:120,atk:30,spd:20,attr:"fire",skill:"耐える"},
{name:"カバオ",hp:150,atk:20,spd:10,attr:"water",skill:"回復"},
{name:"ジュウゾウ",hp:100,atk:35,spd:25,attr:"thunder",skill:"会心"},
{name:"ナマケン",hp:90,atk:28,spd:40,attr:"thunder",skill:"先制"},
{name:"ゴリさん",hp:140,atk:25,spd:15,attr:"fire",skill:"反撃"},
{name:"ペンペン",hp:110,atk:22,spd:22,attr:"water",skill:"安定"}
];

let select=[];
let pTeam=[],eTeam=[];
let p,e;

/* ---------- 画面 ---------- */
function goSelect(){
switchScreen("title","select");
renderSelect();
}

function switchScreen(a,b){
document.getElementById(a).classList.remove("active");
document.getElementById(b).classList.add("active");
}

/* ---------- 編成 ---------- */
function renderSelect(){
let list=document.getElementById("list");
list.innerHTML="";

chars.forEach((c,i)=>{
let div=document.createElement("div");
div.className="card "+c.attr;
div.innerHTML=c.name+"<br>HP"+c.hp;
div.onclick=()=>{
if(select.includes(i)){
select=select.filter(x=>x!==i);
div.style.outline="";
}else if(select.length<5){
select.push(i);
div.style.outline="3px solid #fff";
}
};
list.appendChild(div);
});
}

/* ---------- 開始 ---------- */
function startBattle(){
if(select.length<5){alert("5体選んで");return;}

pTeam = select.map(i=>({...chars[i]}));
eTeam = shuffle([...chars]).slice(0,5);

switchScreen("select","battle");

next();
}

/* ---------- 勝ち抜き ---------- */
function next(){
p=pTeam.shift();
e=eTeam.shift();

if(!p){end("敗北");return;}
if(!e){end("勝利");return;}

render();
loop();
}

/* ---------- 描画 ---------- */
function render(){
setClass("player",p.attr);
setClass("enemy",e.attr);

set("pname",p.name+" HP:"+p.hp);
set("ename",e.name+" HP:"+e.hp);

setHP("php",p.hp);
setHP("ehp",e.hp);
}

/* ---------- 戦闘 ---------- */
function loop(){
let first = (p.spd+Math.random()*10) > (e.spd+Math.random()*10) ? p : e;

attack(first, first===p?e:p);

setTimeout(()=>{
if(p.hp>0 && e.hp>0) loop();
else next();
},700);
}

/* ---------- 攻撃 ---------- */
function attack(a,d){

showBubble(a===p?"p":"e","いくぞ");

setTimeout(()=>{
let dmg = calcDamage(a,d);

d.hp -= dmg;

playHit(d===p?"player":"enemy");

showBubble(d===p?"p":"e","いて");

setLive(a.name+" → "+d.name+" "+dmg+"ダメージ");

if(d.hp<=0){
showBubble(d===p?"p":"e","やられた");
}

render();

},200);
}

/* ---------- ダメージ ---------- */
function calcDamage(a,d){
let base = a.atk + Math.random()*10;

if(a.attr==="fire" && d.attr==="thunder") base*=1.3;
if(a.attr==="water" && d.attr==="fire") base*=1.3;
if(a.attr==="thunder" && d.attr==="water") base*=1.3;

if(a.skill==="会心" && Math.random()<0.3) base*=2;

return Math.floor(base);
}

/* ---------- 演出 ---------- */
function playHit(id){
let el=document.getElementById(id);
el.classList.remove("hit","flash");
void el.offsetWidth;
el.classList.add("hit","flash");
setTimeout(()=>el.classList.remove("hit","flash"),200);
}

function showBubble(side,text){
let el=document.getElementById(side==="p"?"pbubble":"ebubble");
el.textContent=text;
el.className="bubble";
setTimeout(()=>el.textContent="",600);
}

/* ---------- UI ---------- */
function setLive(t){
document.getElementById("live").textContent=t;
let log=document.getElementById("log");
log.innerHTML+=t+"<br>";
log.scrollTop=log.scrollHeight;
}

function set(id,t){document.getElementById(id).textContent=t}
function setHP(id,v){document.getElementById(id).style.width=Math.max(v,0)+"%"}
function setClass(id,a){document.getElementById(id).className="fighter "+a}

function shuffle(a){return a.sort(()=>Math.random()-0.5)}

function end(t){setLive(t)}

</script>

</body>
</html>
