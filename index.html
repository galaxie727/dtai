<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>デカブサ大戦</title>
<style>
*{box-sizing:border-box}
html,body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
}
body{
  display:flex;
  justify-content:center;
}
[hidden]{display:none!important}

:root{
  --maxw:560px;
  --line:rgba(255,255,255,.12);
  --muted:rgba(255,255,255,.68);
  --btn:#fff;
  --btnText:#000;
  --panelGlow:0 8px 24px rgba(0,0,0,.35);
}

.app{
  width:100%;
  max-width:var(--maxw);
  min-height:100svh;
  padding:16px;
}
.screen{
  min-height:calc(100svh - 32px);
  display:flex;
  flex-direction:column;
}
.title{
  text-align:center;
  font-size:34px;
  font-weight:900;
  letter-spacing:.08em;
  margin-top:8px;
}
.sub{
  text-align:center;
  font-size:14px;
  color:var(--muted);
  margin-top:10px;
}
.center{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
}
.btn{
  width:100%;
  border:none;
  border-radius:14px;
  padding:16px 14px;
  font-size:18px;
  font-weight:900;
  background:var(--btn);
  color:var(--btnText);
}
.btn:active{transform:scale(.98)}
.btnGhost{
  width:100%;
  border:none;
  border-radius:14px;
  padding:16px 14px;
  font-size:18px;
  font-weight:900;
  background:#1f1f1f;
  color:#fff;
  border:1px solid var(--line);
}
.version{
  text-align:center;
  font-size:12px;
  opacity:.4;
  margin-top:12px;
}
.heroWrap{text-align:center}
.hero{
  width:min(76vw,310px);
  max-width:310px;
  opacity:.97;
  animation:float 4s ease-in-out infinite;
  filter:drop-shadow(0 8px 24px rgba(0,0,0,.45));
}
.copy{
  text-align:center;
  font-size:16px;
  opacity:.85;
  margin-bottom:22px;
}
.titleFooter{padding-bottom:10px}
@keyframes float{
  0%{transform:translateY(0)}
  50%{transform:translateY(-8px)}
  100%{transform:translateY(0)}
}

.topBar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:14px;
}
.backBtn{
  width:auto;
  min-width:92px;
  padding:12px 14px;
  font-size:14px;
  border-radius:12px;
}
.row{
  display:flex;
  gap:10px;
}
.col{min-width:0}
.leftCol{flex:1.08}
.rightCol{flex:.92}

.panel{
  background:linear-gradient(180deg,#141414,#101010);
  border:1px solid var(--line);
  border-radius:16px;
  padding:12px;
  box-shadow:var(--panelGlow);
}
.sectionTitle{
  font-size:18px;
  font-weight:900;
  margin:14px 0 10px;
}
.teamInfo{
  font-size:12px;
  color:var(--muted);
  margin-top:4px;
}

/* 編成候補 */
.pickGrid{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
}
.pickCard{
  background:#1d1d1d;
  border:1px solid var(--line);
  border-radius:16px;
  padding:12px;
  min-height:154px;
}
.pickCard.selected{
  outline:2px solid rgba(255,255,255,.65);
}
.charTop{
  display:grid;
  grid-template-columns:120px 1fr;
  gap:14px;
  align-items:stretch;
}
.pickThumb{
  width:120px;
  height:120px;
  border-radius:16px;
  object-fit:contain;
  background:#0d0d0d;
  border:1px solid var(--line);
  display:block;
}
.charInfo{
  min-width:0;
  display:flex;
  flex-direction:column;
}
.charHead{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:8px;
}
.charName{
  font-size:18px;
  font-weight:900;
  line-height:1.2;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.charMeta{
  font-size:13px;
  color:var(--muted);
  line-height:1.45;
}
.miniTag{
  display:inline-block;
  padding:5px 9px;
  border-radius:999px;
  font-size:11px;
  font-weight:800;
  border:1px solid var(--line);
  white-space:nowrap;
}
.attr-fire{background:rgba(255,123,123,.12)}
.attr-water{background:rgba(115,169,255,.12)}
.attr-thunder{background:rgba(255,217,94,.12)}

.roleRow{
  margin-top:7px;
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}
.roleTag{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:4px 8px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.12);
  background:#232323;
  font-size:11px;
  font-weight:800;
  color:#f1f1f1;
}
.roleTag.type-attack{background:rgba(255,120,120,.12)}
.roleTag.type-tank{background:rgba(120,200,255,.12)}
.roleTag.type-speed{background:rgba(255,220,120,.12)}
.roleTag.type-balance{background:rgba(180,180,180,.12)}
.roleTag.type-finisher{background:rgba(200,120,255,.12)}
.roleTag.type-trick{background:rgba(120,255,200,.12)}

.pickActions{
  margin-top:auto;
  display:flex;
  justify-content:flex-end;
  gap:8px;
}
.smallBtn{
  width:124px;
  border:none;
  border-radius:12px;
  padding:12px 10px;
  font-size:15px;
  font-weight:900;
  background:#fff;
  color:#000;
}
.smallBtn.subBtn{
  background:#242424;
  color:#fff;
  border:1px solid var(--line);
}
.smallBtn.ghostBtn{
  background:#1b1b1b;
  color:#fff;
  border:1px solid var(--line);
}

/* 現在の並び */
.teamList{
  display:flex;
  flex-direction:column;
  gap:8px;
}
.teamSlot{
  background:#1d1d1d;
  border:1px solid var(--line);
  border-radius:14px;
  padding:10px;
  display:grid;
  grid-template-columns:42px 54px 1fr 58px;
  gap:10px;
  align-items:center;
}
.slotNum{
  width:42px;
  height:42px;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#202020;
  border:1px solid var(--line);
  font-weight:900;
  font-size:14px;
}
.slotThumb{
  width:54px;
  height:54px;
  border-radius:12px;
  object-fit:cover;
  background:#0d0d0d;
  border:1px solid var(--line);
}
.slotMain{min-width:0}
.slotName{
  font-size:15px;
  font-weight:900;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.slotMeta{
  font-size:11px;
  color:var(--muted);
  margin-top:2px;
}
.slotEmpty{color:rgba(255,255,255,.35)}
.moveBtns{
  display:flex;
  flex-direction:column;
  gap:6px;
}
.moveBtn{
  border:none;
  border-radius:10px;
  background:#2a2a2a;
  color:#fff;
  font-weight:900;
  padding:7px 0;
  border:1px solid var(--line);
  font-size:12px;
}
.moveBtn:disabled{opacity:.28}
.removeBtn{
  margin-top:6px;
  border:none;
  border-radius:10px;
  background:#1d1d1d;
  color:#fff;
  border:1px solid var(--line);
  padding:8px 0;
  font-size:12px;
  font-weight:900;
  width:100%;
}
.bottomActions{
  margin-top:14px;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.enemyPreview{
  margin-top:10px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
}
.enemyPreviewCard{
  background:#191919;
  border:1px solid var(--line);
  border-radius:10px;
  padding:8px;
  text-align:center;
}
.enemyPreviewCard img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  border-radius:8px;
  background:#0d0d0d;
  border:1px solid var(--line);
}
.enemyPreviewCard .n{
  font-size:11px;
  margin-top:5px;
  line-height:1.3;
}

.buildHint{
  margin-top:10px;
  background:#111;
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px;
  font-size:13px;
  line-height:1.65;
  white-space:pre-line;
}

/* モード切替 */
.modeRow{
  display:flex;
  gap:8px;
  margin-top:10px;
}
.modeBtn{
  flex:1;
  border:none;
  border-radius:12px;
  padding:12px 8px;
  background:#242424;
  color:#fff;
  border:1px solid var(--line);
  font-size:13px;
  font-weight:900;
}
.modeBtn.active{
  background:#fff;
  color:#000;
}

/* メタ */
.battleMeta{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:10px;
}
.metaPill{
  padding:7px 10px;
  border-radius:999px;
  border:1px solid var(--line);
  background:#171717;
  font-size:11px;
  color:#ddd;
}
.alivePill{font-weight:900}
.aliveGood{color:#b8ffd1}
.aliveBad{color:#ffc1c1}
  /* 戦況表 */
.statusBoardWrap{
  position:relative;
  margin-bottom:12px;
}
.statusBoard{
  background:linear-gradient(180deg,#141414,#101010);
  border:1px solid var(--line);
  border-radius:16px;
  padding:12px;
  box-shadow:var(--panelGlow);
  position:relative;
  z-index:1;
}
.statusLines{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:2;
}
.statusHead{
  display:grid;
  grid-template-columns:1fr 44px 1fr;
  gap:8px;
  align-items:center;
  margin-bottom:8px;
}
.statusHead .label{
  font-size:13px;
  font-weight:900;
  color:#ddd;
}
.statusHead .label.right{
  text-align:right;
}
.statusRows{
  display:flex;
  flex-direction:column;
  gap:6px;
}
.statusRow{
  display:grid;
  grid-template-columns:1fr 44px 1fr;
  gap:8px;
  align-items:center;
}
.miniSideCard{
  background:#1a1a1a;
  border:1px solid var(--line);
  border-radius:12px;
  padding:8px;
  min-height:58px;
  display:grid;
  grid-template-columns:40px 1fr auto;
  gap:8px;
  align-items:center;
  position:relative;
}
.miniSideCard.right{
  grid-template-columns:auto 1fr 40px;
}
.miniSideCard.dead{
  opacity:.35;
  filter:grayscale(1);
}
.miniSideCard.active{
  outline:2px solid rgba(255,255,255,.55);
  box-shadow:0 0 0 3px rgba(255,255,255,.08);
}
.miniSideCard img{
  width:40px;
  height:40px;
  border-radius:10px;
  object-fit:cover;
  background:#0d0d0d;
  border:1px solid var(--line);
}
.miniSideCard.playerSide img{
  transform:scaleX(-1);
}
.miniSideCard.enemySide img{
  transform:scaleX(1);
}
.miniSideMain{min-width:0}
.miniSideName{
  font-size:12px;
  font-weight:900;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.miniSideMeta{
  font-size:10px;
  color:var(--muted);
  margin-top:2px;
}
.miniSideBadge{
  font-size:11px;
  font-weight:900;
  color:#fff;
}
.boardVs{
  display:flex;
  align-items:center;
  justify-content:center;
}
.boardLink{
  width:100%;
  height:2px;
  background:rgba(255,255,255,.18);
  position:relative;
}
.boardLink.active{
  background:rgba(255,255,255,.75);
  box-shadow:0 0 10px rgba(255,255,255,.22);
}

/* 拡大対戦 */
.battleTop{
  display:grid;
  grid-template-columns:1fr 64px 1fr;
  gap:10px;
  align-items:stretch;
  margin-bottom:10px;
}
.sideLabel{
  font-size:12px;
  color:var(--muted);
  margin-bottom:6px;
}
.vs{
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  font-weight:900;
  opacity:.95;
}

.fighterCard{
  border:1px solid var(--line);
  border-radius:18px;
  padding:14px;
  min-height:270px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  box-shadow:var(--panelGlow);
  position:relative;
  overflow:hidden;
}
.fighterCard.fire{
  background:
    radial-gradient(circle at 30% 20%, rgba(255,90,90,.20), transparent 42%),
    linear-gradient(180deg,#251313,#120d0d);
}
.fighterCard.water{
  background:
    radial-gradient(circle at 30% 20%, rgba(90,150,255,.20), transparent 42%),
    linear-gradient(180deg,#101a2a,#0c1018);
}
.fighterCard.thunder{
  background:
    radial-gradient(circle at 30% 20%, rgba(255,220,90,.18), transparent 42%),
    linear-gradient(180deg,#26210f,#13110b);
}
.fighterCard.none{
  background:linear-gradient(180deg,#171717,#101010);
}
.fighterHeader{
  display:flex;
  flex-direction:column;
  gap:6px;
  min-width:0;
  padding-left:8px;
}
#enemyCard .fighterHeader{
  padding-left:0;
  padding-right:8px;
}
.fighterBadges{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}
.fighterBadges.right{
  justify-content:flex-end;
}
.infoBadge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:4px 10px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.16);
  background:rgba(255,255,255,.08);
  font-size:11px;
  font-weight:900;
}
.badge-attr-fire{background:rgba(255,123,123,.12)}
.badge-attr-water{background:rgba(115,169,255,.12)}
.badge-attr-thunder{background:rgba(255,217,94,.12)}
.badge-good{background:rgba(120,225,160,.16);color:#b8ffd1}
.badge-bad{background:rgba(255,127,127,.16);color:#ffc1c1}
.badge-even{background:rgba(255,255,255,.08);color:#eee}

.fighterName{
  font-size:20px;
  font-weight:900;
  line-height:1.1;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  word-break:keep-all;
}
.fighterRole{
  font-size:14px;
  color:#b8c8ff;
  line-height:1.2;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.fighterBody{
  flex:1;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  position:relative;
  min-height:140px;
  padding-bottom:6px;
}
.fighterVisual{
  width:150px;
  height:140px;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  position:relative;
}
.fighterImg{
  max-width:100%;
  max-height:140px;
  object-fit:contain;
  filter:drop-shadow(0 8px 18px rgba(0,0,0,.45));
}
.fighterVisual.player .fighterImg{
  transform:scaleX(-1);
}
.fighterVisual.enemy .fighterImg{
  transform:scaleX(1);
}
.hpWrap{margin-top:8px}
.hpRow{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  margin-bottom:5px;
}
.hpBar{
  width:100%;
  height:12px;
  background:#292929;
  border-radius:999px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.08);
}
.hpFill{
  height:100%;
  width:100%;
  background:#fff;
  transition:width .28s ease;
}
.hpFill.low{background:#ff7b7b}
.hpFill.mid{background:#ffd24d}
.hpFill.high{background:#77e0a0}

/* 演出 */
.liveTicker{
  margin:4px 0 10px;
  padding:14px 14px;
  border-radius:14px;
  background:linear-gradient(180deg,#181818,#111);
  border:1px solid rgba(255,255,255,.12);
  font-size:17px;
  font-weight:900;
  line-height:1.45;
  min-height:56px;
  display:flex;
  align-items:center;
  box-shadow:0 8px 24px rgba(0,0,0,.28);
}
.battleBubble{
  position:absolute;
  top:-4px;
  max-width:120px;
  padding:8px 10px;
  border-radius:12px;
  background:rgba(255,255,255,.96);
  color:#111;
  font-size:12px;
  font-weight:900;
  line-height:1.35;
  box-shadow:0 6px 18px rgba(0,0,0,.28);
  z-index:3;
  animation:bubblePop .45s ease;
}
.battleBubble.left{left:-2px}
.battleBubble.right{right:-2px}
.battleBubble.left::after{
  content:"";
  position:absolute;
  left:18px;
  bottom:-8px;
  border-width:8px 7px 0 7px;
  border-style:solid;
  border-color:rgba(255,255,255,.96) transparent transparent transparent;
}
.battleBubble.right::after{
  content:"";
  position:absolute;
  right:18px;
  bottom:-8px;
  border-width:8px 7px 0 7px;
  border-style:solid;
  border-color:rgba(255,255,255,.96) transparent transparent transparent;
}
@keyframes bubblePop{
  0%{opacity:0;transform:translateY(6px) scale(.92)}
  100%{opacity:1;transform:translateY(0) scale(1)}
}
.fighterCard.hit{
  animation:cardHitShake .22s ease;
}
.fighterCard.hit-enemy{
  animation:cardHitShakeEnemy .22s ease;
}
.fighterCard.flash::after{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(255,255,255,.28);
  pointer-events:none;
  animation:cardHitFlash .22s ease;
}
@keyframes cardHitShake{
  0%{transform:translateX(0)}
  20%{transform:translateX(-8px)}
  40%{transform:translateX(7px)}
  60%{transform:translateX(-5px)}
  80%{transform:translateX(3px)}
  100%{transform:translateX(0)}
}
@keyframes cardHitShakeEnemy{
  0%{transform:translateX(0)}
  20%{transform:translateX(8px)}
  40%{transform:translateX(-7px)}
  60%{transform:translateX(5px)}
  80%{transform:translateX(-3px)}
  100%{transform:translateX(0)}
}
@keyframes cardHitFlash{
  0%{opacity:0}
  25%{opacity:1}
  100%{opacity:0}
}
.hpBar.hitbar{
  box-shadow:0 0 0 2px rgba(255,255,255,.12), 0 0 16px rgba(255,255,255,.22);
}
.damageText{
  position:absolute;
  top:18px;
  left:50%;
  transform:translateX(-50%);
  font-size:24px;
  font-weight:900;
  color:#fff;
  text-shadow:0 2px 10px rgba(0,0,0,.6);
  pointer-events:none;
  z-index:4;
  animation:damagePop .7s ease forwards;
}
.damageText.crit{
  color:#ffd95e;
}
@keyframes damagePop{
  0%{opacity:0;transform:translateX(-50%) translateY(10px) scale(.7)}
  25%{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}
  100%{opacity:0;transform:translateX(-50%) translateY(-24px) scale(1.05)}
}
  .logPanel{
  flex:1;
  background:#111;
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px;
  overflow:auto;
  min-height:210px;
  max-height:30svh;
}
.logLine{
  font-size:13px;
  line-height:1.65;
  padding:4px 0;
  border-bottom:1px dashed rgba(255,255,255,.06);
}
.battleActions{
  margin-top:12px;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.resultTitle{
  font-size:22px;
  font-weight:900;
  text-align:center;
  margin:8px 0 4px;
}
.resultSub{
  text-align:center;
  color:var(--muted);
  font-size:13px;
  margin-bottom:8px;
}
.summaryCard{
  background:#111;
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px;
  line-height:1.75;
  font-size:13px;
  white-space:pre-line;
}
.speedRow{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}
.speedBtn{
  flex:1;
  min-width:84px;
  border:none;
  border-radius:12px;
  padding:10px 8px;
  background:#242424;
  color:#fff;
  border:1px solid var(--line);
  font-size:12px;
  font-weight:900;
}
.speedBtn.active{
  background:#fff;
  color:#000;
}
.flashMsg{
  position:sticky;
  top:0;
  z-index:5;
  margin-bottom:10px;
  text-align:center;
  font-size:18px;
  font-weight:900;
  padding:10px 12px;
  border-radius:14px;
  background:linear-gradient(180deg,rgba(255,255,255,.16),rgba(255,255,255,.06));
  border:1px solid rgba(255,255,255,.2);
  opacity:0;
  transform:translateY(-6px) scale(.98);
  transition:.18s ease;
  pointer-events:none;
}

<script>

  { id:"tora", name:"トラさん", attr:"thunder", role:"回避トリッキー", roleType:"trick", hp:102, atk:33, def:17, spd:29, img:"./tora.png" },
  { id:"juzo", name:"ジュウゾウ", attr:"thunder", role:"反撃型", roleType:"tank", hp:116, atk:34, def:21, spd:21, img:"./juzo.png" },
  { id:"rate", name:"ラテロウ", attr:"thunder", role:"最速先鋒", roleType:"speed", hp:98, atk:32, def:16, spd:34, img:"./rate.png" }
];

const attackLines = {
  dekabusa:["まあ行くか","やるか","重いぞ"],
  kan:["初手だ","行くぞ","決める"],
  panpan:["うおりゃ","暴れる","いくぞ"],
  king:["仕留める","逃がさない","終わりだ"],
  gori:["ふんっ","受けろ","いくぞ"],
  kabao:["まだまだ","どっしり","重いぞ"],
  namaken:["やる時はやる","今だ","そこだ"],
  nise:["似てるだけじゃない","いくぞ","本気だ"],
  ani:["遅い","見えてる","終わりだ"],
  tora:["見切れるか？","いくぞ","捕まえた"],
  juzo:["返す","そこだ","読めた"],
  rate:["速いだろ","先に行く","置いてくぞ"]
};

const hitLines = {
  dekabusa:["いて","重いな","まだだ"],
  kan:["まだだ","浅い","効くな"],
  panpan:["うわ","ちっ","まだまだ"],
  king:["浅いな","その程度か","まだ立つ"],
  gori:["効くな","まだいける","ふんばる"],
  kabao:["その程度か","まだ立ってる","平気だ"],
  namaken:["やるな","ちょい痛い","まだだ"],
  nise:["似てない痛さだ","効くな","まだいる"],
  ani:["チッ","悪くない","まだだ"],
  tora:["かすった","まだ見える","浅い"],
  juzo:["読んでた","まだだ","返す"],
  rate:["まだ速い","それだけか","効くな"]
};

const koLines = {
  dekabusa:["今日はそういう日だ"],
  panpan:["暴れ足りない"],
  kabao:["ここまでか"],
  rate:["速いだけじゃ足りない"],
  ani:["次は本気だ"]
};

let team = [];
let battle = null;
let speedMode = "normal";
let previewState = null;
let previewSelectedPlayerId = null;
let battleMode = "survival";
  const speedMap = {
  normal: { talk:420, afterHit:320, endTurn:260, intro:650, start:260, ko:700, enter:500, bubble:850 },
  fast:   { talk:220, afterHit:160, endTurn:120, intro:260, start:140, ko:320, enter:220, bubble:500 },
  turbo:  { talk:70,  afterHit:40,  endTurn:30,  intro:40,  start:20,  ko:90,  enter:60,  bubble:220 }
};

function attrLabel(attr){
  if(attr === "fire") return "火";
  if(attr === "water") return "水";
  return "雷";
}
function attrClass(attr){
  if(attr === "fire") return "attr-fire";
  if(attr === "water") return "attr-water";
  return "attr-thunder";
}
function attrCardClass(attr){
  if(attr === "fire") return "fire";
  if(attr === "water") return "water";
  if(attr === "thunder") return "thunder";
  return "none";
}
function orderLabel(i){
  return ["先鋒","次鋒","中堅","副将","大将"][i] || "-";
}
function matchupText(a, b){
  const r = attributeRate(a.attr, b.attr);
  if(r > 1) return { text:"有利", cls:"badge-good" };
  if(r < 1) return { text:"不利", cls:"badge-bad" };
  return { text:"五分", cls:"badge-even" };
}
function getVictoryLine(name){
  const map = {
    "デカブサ":"まあ勝った。",
    "カンえもん":"初手で決めた。",
    "パンパン":"たまたまだな。",
    "キング":"仕留めた。",
    "ゴリさん":"ふんばった。",
    "カバオ":"まだ立ってる。",
    "ナマケン":"やればできる。",
    "ニセブサ":"似てるだけじゃない。",
    "デカブサ兄":"当然だな。",
    "トラさん":"分身しただけだ。",
    "ジュウゾウ":"反撃完了。",
    "ラテロウ":"速かっただろ。"
  };
  return map[name] || "勝った。";
}
function getLoseLine(name){
  const map = {
    "デカブサ":"今日はそういう日だ。",
    "カンえもん":"初手は良かった。",
    "パンパン":"暴れ足りない。",
    "キング":"仕留めきれなかった。",
    "ゴリさん":"受けきれなかった。",
    "カバオ":"まだいけると思った。",
    "ナマケン":"ちょっと遅かった。",
    "ニセブサ":"本物じゃなかった。",
    "デカブサ兄":"次は本気だ。",
    "トラさん":"分身不足だ。",
    "ジュウゾウ":"返しきれなかった。",
    "ラテロウ":"速いだけじゃ足りない。"
  };
  return map[name] || "負けた。";
}
function randomLine(map, id, fallback){
  const arr = map[id];
  if(!arr || !arr.length) return fallback;
  return arr[Math.floor(Math.random() * arr.length)];
}
function getChar(id){
  return characters.find(c => c.id === id);
}
function roleTypeLabel(type){
  if(type === "attack") return "攻撃";
  if(type === "tank") return "耐久";
  if(type === "speed") return "先手";
  if(type === "balance") return "万能";
  if(type === "finisher") return "後半";
  return "搦手";
}
function roleTagHtml(ch){
  return `
    <span class="roleTag type-${ch.roleType}">${roleTypeLabel(ch.roleType)}</span>
    <span class="roleTag">属性:${attrLabel(ch.attr)}</span>
  `;
}
function cloneFighter(char, side, orderIndex){
  return {
    ...JSON.parse(JSON.stringify(char)),
    side,
    orderIndex,
    maxHp: char.hp,
    currentHp: char.hp,
    alive: true,
    wins: 0,
    damageDealt: 0,
    damageTaken: 0,
    turns: 0,
    mvpScore: 0,
    fixedWins: 0,
    flags: {
      firstAttackDone: false,
      firstHitTaken: false,
      aniBoost: 0,
      counterReady: false,
      isFirstThisTurn: false
    }
  };
}
function attributeRate(attackerAttr, defenderAttr){
  if(attackerAttr === "fire" && defenderAttr === "thunder") return 1.2;
  if(attackerAttr === "thunder" && defenderAttr === "water") return 1.2;
  if(attackerAttr === "water" && defenderAttr === "fire") return 1.2;

  if(attackerAttr === "thunder" && defenderAttr === "fire") return 0.85;
  if(attackerAttr === "water" && defenderAttr === "thunder") return 0.85;
  if(attackerAttr === "fire" && defenderAttr === "water") return 0.85;

  return 1.0;
}
function showScreen(id){
  document.getElementById("screenTitle").hidden = true;
  document.getElementById("screenBuild").hidden = true;
  document.getElementById("screenBattle").hidden = true;
  document.getElementById(id).hidden = false;
}
function goTitle(){ showScreen("screenTitle"); }
function goBuild(){
  showScreen("screenBuild");
  renderAll();
}
function backToBuildFromBattle(){
  battle = null;
  showScreen("screenBuild");
  renderAll();
}
function wait(ms){
  return new Promise(resolve => setTimeout(resolve, ms));
}

function setBattleMode(mode){
  battleMode = mode;
  document.getElementById("modeSurvivalBtn").classList.toggle("active", mode === "survival");
  document.getElementById("modeFixedBtn").classList.toggle("active", mode === "fixed");
  document.getElementById("modeHint").textContent =
    mode === "survival"
      ? "勝った側が残って次と戦う"
      : "先鋒同士、次鋒同士…の5本勝負";
}

function addToTeam(id){
  if(team.includes(id)) return;
  if(team.length >= 5){
    alert("5体までです");
    return;
  }
  team.push(id);
  renderAll();
}
function removeFromTeam(id){
  team = team.filter(v => v !== id);
  renderAll();
}
function moveUp(index){
  if(index <= 0) return;
  [team[index - 1], team[index]] = [team[index], team[index - 1]];
  renderAll();
}
function moveDown(index){
  if(index >= team.length - 1) return;
  [team[index + 1], team[index]] = [team[index], team[index + 1]];
  renderAll();
}
function clearTeam(){
  team = [];
  document.getElementById("enemyPreviewWrap").hidden = true;
  renderAll();
}
function autoFillTeam(){
  team = ["rate","namaken","ani","kabao","king"];
  document.getElementById("enemyPreviewWrap").hidden = true;
  renderAll();
}

function buildTeamHint(){
  if(team.length === 0) return "並び特徴\nまだ未選択";
  const arr = team.map(getChar);
  const avgSpd = arr.reduce((s,v)=>s+v.spd,0)/arr.length;
  const avgDef = arr.reduce((s,v)=>s+v.def,0)/arr.length;
  const first = arr[0];
  const last = arr[arr.length-1];

  const lines = [];
  lines.push("並び特徴");
  lines.push(battleMode === "survival" ? "モード：勝ち抜き" : "モード：対面固定");

  if(avgSpd >= 25) lines.push("全体：先手寄り");
  else if(avgDef >= 22) lines.push("全体：耐久寄り");
  else lines.push("全体：バランス");

  if(first) lines.push(`先鋒向き：${first.name}（${first.role}）`);
  if(last && arr.length >= 3) lines.push(`後半の鍵：${last.name}（${last.role}）`);

  if(battleMode === "fixed"){
    lines.push("固定では並び相性がそのまま勝敗に出やすい");
  }else{
    lines.push("勝ち抜きでは連勝役と受け役が重要");
  }

  return lines.join("\n");
}

function shuffle(arr){
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function scoreForAI(char){
  let score = 0;
  score += char.hp * 0.7;
  score += char.atk * 1.15;
  score += char.def * 0.8;
  score += char.spd * 0.65;
  if(char.id === "rate") score += 18;
  if(char.id === "kan") score += 10;
  if(char.id === "namaken") score += 10;
  if(char.id === "ani") score += 16;
  if(char.id === "kabao") score += 15;
  if(char.id === "king") score += 12;
  return score;
}
function makeEnemyTeam(){
  const pool = characters.map(c => c.id).filter(id => !team.includes(id));
  let enemyChars = shuffle(pool).slice(0,5).map(id => getChar(id));
  enemyChars.sort((a,b) => scoreForAI(b) - scoreForAI(a));

  const front = [];
  const middle = [];
  const back = [];
  for(const c of enemyChars){
    if(["rate","kan","tora"].includes(c.id)) front.push(c);
    else if(["kabao","gori","nise","juzo"].includes(c.id)) middle.push(c);
    else back.push(c);
  }
  enemyChars = [...front, ...middle, ...back].slice(0,5);
  return enemyChars.map(c => c.id);
}

function effectiveSpeed(f){
  const fatigueRate = 1 - Math.min(f.wins * 0.05, 0.15);
  return Math.max(1, Math.round(f.spd * fatigueRate));
}
function decideFirst(a, b){
  const aSpd = effectiveSpeed(a);
  const bSpd = effectiveSpeed(b);
  const diff = aSpd - bSpd;
  let aRate = 0.5;
  if(diff >= 12) aRate = 0.75;
  else if(diff >= 6) aRate = 0.65;
  else if(diff >= 3) aRate = 0.58;
  else if(diff <= -12) aRate = 0.25;
  else if(diff <= -6) aRate = 0.35;
  else if(diff <= -3) aRate = 0.42;
  return Math.random() < aRate ? a : b;
}

function calcDamage(attacker, defender){
  if(!attacker.alive || !defender.alive) return {damage:0, text:"", isCrit:false};

  if(defender.id === "tora" && Math.random() < 0.20){
    return { damage:0, text:`${defender.name}は分身した。`, isCrit:false };
  }

  let skillRate = 1.0;
  let extraTexts = [];

  if(attacker.id === "dekabusa" && attacker.currentHp <= attacker.maxHp * 0.5){
    skillRate *= 1.5;
    extraTexts.push(`${attacker.name}の背水。`);
  }
  if(attacker.id === "kan" && !attacker.flags.firstAttackDone){
    skillRate *= 1.4;
    extraTexts.push(`${attacker.name}の初撃全力。`);
  }
  if(attacker.id === "panpan"){
    const r = Math.random();
    if(r < 0.20){
      attacker.flags.firstAttackDone = true;
      return { damage:0, text:`${attacker.name}は空振りした。`, isCrit:false };
    }else if(r < 0.50){
      skillRate *= 1.7;
      extraTexts.push(`${attacker.name}が暴走した。`);
    }
  }
  if(attacker.id === "king" && defender.currentHp <= defender.maxHp * 0.3){
    skillRate *= 1.6;
    extraTexts.push(`${attacker.name}が仕留めに来た。`);
  }
  if(attacker.id === "namaken" && defender.currentHp === defender.maxHp){
    skillRate *= 1.5;
    extraTexts.push(`${attacker.name}の後出し強襲。`);
  }
  if(attacker.id === "ani"){
    skillRate *= (1 + attacker.flags.aniBoost);
    if(attacker.flags.aniBoost > 0) extraTexts.push(`${attacker.name}の加速装置。`);
  }
  if(attacker.id === "juzo" && attacker.flags.counterReady){
    skillRate *= 1.5;
    attacker.flags.counterReady = false;
    extraTexts.push(`${attacker.name}の反撃態勢。`);
  }
  if(attacker.id === "rate" && attacker.flags.isFirstThisTurn){
    skillRate *= 1.3;
    extraTexts.push(`${attacker.name}の先手必勝。`);
  }

  let defendRate = 1.0;
  if(defender.id === "gori" && !defender.flags.firstHitTaken){
    defendRate *= 0.5;
    extraTexts.push(`${defender.name}の初回ガード。`);
  }
  if(defender.id === "nise"){
    defendRate *= 0.8;
  }

  const fatigueAtk = 1 - Math.min(attacker.wins * 0.04, 0.12);
  const base = Math.max(8, (attacker.atk * fatigueAtk) - defender.def * 0.5);
  const attr = attributeRate(attacker.attr, defender.attr);
  const rand = 0.92 + Math.random() * 0.16;
  const crit = Math.random() < 0.08 ? 1.5 : 1.0;

  let damage = Math.round(base * attr * skillRate * defendRate * rand * crit);
  damage = Math.max(8, damage);

  attacker.flags.firstAttackDone = true;
  defender.flags.firstHitTaken = true;
  if(crit > 1) extraTexts.push("クリティカル。");

  return { damage, text: extraTexts.join(" "), isCrit: crit > 1 };
}

function healEndTurn(f){
  if(!f.alive) return null;
  if(f.id === "kabao"){
    const before = f.currentHp;
    f.currentHp = Math.min(f.maxHp, f.currentHp + 8);
    if(f.currentHp > before) return `${f.name}は回復した。`;
  }
  return null;
}

function getActivePlayer(){ return battle.playerTeam[battle.playerActiveIndex]; }
function getActiveEnemy(){ return battle.enemyTeam[battle.enemyActiveIndex]; }
function teamAliveCount(teamArr){
  return teamArr.filter(f => f.alive).length;
}

function addLog(text){
  battle.logs.push(text);
  const ticker = document.getElementById("liveTicker");
  if(ticker) ticker.textContent = text;

  const panel = document.getElementById("logPanel");
  const div = document.createElement("div");
  div.className = "logLine";
  div.textContent = text;
  panel.appendChild(div);
  panel.scrollTop = panel.scrollHeight;
}

function playHitEffect(side){
  const card = document.getElementById(side === "player" ? "playerCard" : "enemyCard");
  if(!card) return;
  card.classList.remove("hit", "hit-enemy", "flash");
  void card.offsetWidth;
  card.classList.add(side === "player" ? "hit" : "hit-enemy");
  card.classList.add("flash");
  setTimeout(() => card.classList.remove("hit", "hit-enemy", "flash"), 260);
}

function playHpBarEffect(side){
  const bar = document.getElementById(side === "player" ? "playerHpFill" : "enemyHpFill");
  if(!bar) return;
  const wrap = bar.parentElement;
  wrap.classList.remove("hitbar");
  void wrap.offsetWidth;
  wrap.classList.add("hitbar");
  setTimeout(() => wrap.classList.remove("hitbar"), 220);
}

function showBubble(side, text){
  const el = document.getElementById(side === "player" ? "playerBubble" : "enemyBubble");
  if(!el) return;
  el.hidden = false;
  el.textContent = text;
  clearTimeout(el._timer);
  el._timer = setTimeout(() => { el.hidden = true; }, speedMap[speedMode].bubble);
}

function showDamage(side, value, isCrit){
  const card = document.getElementById(side === "player" ? "playerCard" : "enemyCard");
  if(!card) return;
  const div = document.createElement("div");
  div.className = "damageText" + (isCrit ? " crit" : "");
  div.textContent = value;
  card.appendChild(div);
  setTimeout(() => div.remove(), 700);
}

function updateHpBar(fillEl, textEl, fighter){
  if(!fighter){
    fillEl.style.width = "0%";
    textEl.textContent = "-";
    return;
  }
  const pct = Math.max(0, fighter.currentHp / fighter.maxHp * 100);
  fillEl.style.width = pct + "%";
  fillEl.className = "hpFill " + (pct <= 30 ? "low" : pct <= 60 ? "mid" : "high");
  textEl.textContent = `${Math.max(0, fighter.currentHp)} / ${fighter.maxHp}`;
}

function setImg(el, fighter){

    el.src = "";
    return;
  }
  el.src = fighter.img;
  el.onerror = function(){ this.style.opacity='.15'; };
  el.style.opacity = "1";
}

function drawStatusLines(){
  const svg = document.getElementById("statusLines");
  const wrapEl = document.querySelector(".statusBoardWrap");
  if(!svg || !wrapEl || !battle) return;

  svg.innerHTML = "";
  const wrap = wrapEl.getBoundingClientRect();

  battle.lineHistory.forEach(item => {
    const from = document.querySelector(`.miniSideCard[data-side="player"][data-idx="${item.playerIdx}"]`);
    const to = document.querySelector(`.miniSideCard[data-side="enemy"][data-idx="${item.enemyIdx}"]`);
    if(!from || !to) return;

    const fr = from.getBoundingClientRect();
    const tr = to.getBoundingClientRect();

    const x1 = fr.right - wrap.left;
    const y1 = fr.top + fr.height / 2 - wrap.top;
    const x2 = tr.left - wrap.left;
    const y2 = tr.top + tr.height / 2 - wrap.top;

    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
    line.setAttribute("x1", x1);
    line.setAttribute("y1", y1);
    line.setAttribute("x2", x2);
    line.setAttribute("y2", y2);
    line.setAttribute("stroke", item.active ? "rgba(255,255,255,.95)" : "rgba(255,255,255,.35)");
    line.setAttribute("stroke-width", item.active ? "3" : "2");
    line.setAttribute("stroke-linecap", "round");
    if(!item.active) line.setAttribute("stroke-dasharray", "6 4");
    svg.appendChild(line);
  });
}

  document.getElementById("playerFighterRole").textContent = p ? p.role : "-";

  document.getElementById("battleRoundText").textContent = `MATCH ${battle.matchCount}`;
  document.getElementById("playerAliveText").textContent = `あなた 残り${teamAliveCount(battle.playerTeam)}`;

async function attackOnce(attacker, defender){
  const result = calcDamage(attacker, defender);
  if(result.text) addLog(result.text);

  if(result.damage <= 0){
    addLog(`${attacker.name}の攻撃は当たらない。`);
    return;
  }

  defender.currentHp -= result.damage;
  defender.damageTaken += result.damage;
  attacker.damageDealt += result.damage;
  attacker.turns += 1;

  playHitEffect(defender.side);
  playHpBarEffect(defender.side);
  showBubble(defender.side, randomLine(hitLines, defender.id, "いて"));
  showDamage(defender.side, result.damage, result.isCrit);

  if(result.isCrit) showFlash("クリティカル！");

  addLog(`${attacker.name}の攻撃。${defender.name}に ${result.damage} ダメージ。`);

  if(defender.id === "juzo" && defender.alive){
    defender.flags.counterReady = true;
  }

  if(defender.currentHp <= 0){
    defender.currentHp = 0;
    defender.alive = false;
    attacker.wins += 1;
    addLog(`${defender.name}は倒れた。`);
    showBubble(defender.side, randomLine(koLines, defender.id, "負けた"));
    showFlash(`${attacker.name} 勝利`);
    addLog(attacker.name + "が勝った。");
    renderBattleHeader();
    await wait(speedMap[speedMode].ko);
  }
}

async function processTurn(){
  const p = getActivePlayer();
  const e = getActiveEnemy();
  if(!p || !e) return;

  battle.turn += 1;
  renderBattleHeader();

  const first = decideFirst(p, e);
  const second = first === p ? e : p;

  p.flags.isFirstThisTurn = (first === p);
  e.flags.isFirstThisTurn = (first === e);

  showBubble(first.side, randomLine(attackLines, first.id, "いくぞ"));
  await wait(speedMap[speedMode].talk);

  await attackOnce(first, second);
  renderBattleHeader();
  await wait(speedMap[speedMode].afterHit);

  if(second.alive){
    showBubble(second.side, randomLine(attackLines, second.id, "やるぞ"));
    await wait(speedMap[speedMode].talk);

    await attackOnce(second, first);
    renderBattleHeader();
    await wait(speedMap[speedMode].afterHit);
  }

  p.flags.isFirstThisTurn = false;
  e.flags.isFirstThisTurn = false;

  if(p.alive){
    if(p.id === "ani") p.flags.aniBoost = Math.min(0.3, p.flags.aniBoost + 0.1);
    const healText = healEndTurn(p);
    if(healText) addLog(healText);
  }
  if(e.alive){
    if(e.id === "ani") e.flags.aniBoost = Math.min(0.3, e.flags.aniBoost + 0.1);
    const healText = healEndTurn(e);
    if(healText) addLog(healText);
  }

  renderBattleHeader();
  await wait(speedMap[speedMode].endTurn);
}

function calcMvpScore(f){
  const hpRate = f.maxHp > 0 ? (Math.max(0, f.currentHp) / f.maxHp) : 0;
  return (
    f.wins * 180 +
    f.fixedWins * 140 +
    f.damageDealt +
    hpRate * 50
  );
}

function calcMvp(teamArr){
  let best = teamArr[0];
  let bestScore = -999999;
  for(const f of teamArr){
    const s = calcMvpScore(f);
    if(s > bestScore){
      bestScore = s;
      best = f;
    }
  }
  best.mvpScore = bestScore;
  return best;
}

function calcWorst(teamArr){
  let worst = teamArr[0];
  for(const f of teamArr){
    const score = f.wins * 1000 + f.damageDealt - f.damageTaken * 0.1;
    const worstScore = worst.wins * 1000 + worst.damageDealt - worst.damageTaken * 0.1;
    if(score < worstScore) worst = f;
  }
  return worst;
}

      <img class="mvpImg" src="${mvp.img}" alt="${mvp.name}" onerror="this.style.opacity='.15'">
    </div>
    <div class="mvpName">${mvp.name}</div>
    <div class="mvpStats">
      撃破 ${mvp.wins} / 固定勝利 ${mvp.fixedWins} / 与ダメ ${mvp.damageDealt} / 残HP ${Math.max(0,mvp.currentHp)}<br>
      MVPスコア ${Math.round(calcMvpScore(mvp))}
    </div>
    <div class="mvpLine">${line}</div>
  `;
}

function buildSummary(){
  const playerAlive = teamAliveCount(battle.playerTeam);
  const enemyAlive = teamAliveCount(battle.enemyTeam);
  const playerWon = battleMode === "fixed"
    ? battle.fixedPlayerWins > battle.fixedEnemyWins
    : enemyAlive === 0;

  const mvp = playerWon ? calcMvp(battle.playerTeam) : calcMvp(battle.enemyTeam);
  const side = playerWon ? "あなた" : "敵";
  const yourMvp = calcMvp(battle.playerTeam);
  const yourWorst = calcWorst(battle.playerTeam);

  renderMvpPanel(mvp);

  let lines = [];
  lines.push(`${playerWon ? "勝ったな。" : "並びだな。"}`);
  lines.push("");
  lines.push(`モード`);
  lines.push(`${battleMode === "survival" ? "勝ち抜き" : "対面固定"}`);
  lines.push("");

  if(battleMode === "fixed"){
    lines.push(`固定勝利数`);
    lines.push(`あなた：${battle.fixedPlayerWins}`);
    lines.push(`敵：${battle.fixedEnemyWins}`);
    lines.push("");
  }

  lines.push(`残り人数`);
  lines.push(`あなた：${playerAlive}`);
  lines.push(`敵：${enemyAlive}`);
  lines.push("");
  lines.push(`全体MVP`);
  lines.push(`${mvp.name}（${side}側）`);
  lines.push(`勝ち抜き数：${mvp.wins}`);
  lines.push(`固定勝利数：${mvp.fixedWins}`);
  lines.push(`総ダメージ：${mvp.damageDealt}`);
  lines.push(`残HP：${Math.max(0,mvp.currentHp)}`);
  lines.push("");
  lines.push(`あなた側MVP：${yourMvp.name}`);
  lines.push(`あなた側で一番早く帰った：${yourWorst.name}`);
  lines.push("");
  lines.push(`あなたの結果`);
  battle.playerTeam.forEach(f => {
    lines.push(`${f.name}：撃破${f.wins} / 固定勝利${f.fixedWins} / 与${f.damageDealt} / 被${f.damageTaken}`);
  });

  return {
    title: playerWon ? "WIN" : "LOSE",
    sub: playerWon ? getVictoryLine(yourMvp.name) : getLoseLine(yourWorst.name),
    text: lines.join("\n")
  };
}

function buildReplayText(){
  if(!battle.lineHistory.length) return "特に見どころはなかった。";
  return battle.lineHistory.map((v,i)=>
    `${i+1}. ${orderLabel(v.playerIdx)} ${battle.playerTeam[v.playerIdx].name} vs ${orderLabel(v.enemyIdx)} ${battle.enemyTeam[v.enemyIdx].name}`
  ).join("\n");
}

function aliveNext(teamArr, startIndex){
  for(let i=startIndex;i<teamArr.length;i++){
    if(teamArr[i].alive) return i;
  }
  return -1;
}

async function battleLoopSurvival(){
  addLog("対戦開始。");
  renderBattleHeader();
  await wait(speedMap[speedMode].intro);

  while(true){
    const p = getActivePlayer();
    const e = getActiveEnemy();
    if(!p || !e) break;

    battle.matchCount += 1;
    battle.turn = 0;

    battle.lineHistory = battle.lineHistory.map(v => ({...v, active:false}));
    battle.lineHistory.push({
      playerIdx: battle.playerActiveIndex,
      enemyIdx: battle.enemyActiveIndex,
      active: true
    });

    renderBattleHeader();
    addLog(`${orderLabel(p.orderIndex)} ${p.name} と ${orderLabel(e.orderIndex)} ${e.name} が向かい合った。`);
    showFlash(`第${battle.matchCount}戦`);
    await wait(speedMap[speedMode].intro);

    while(p.alive && e.alive){
      await processTurn();
    }

    const nextP = aliveNext(battle.playerTeam, battle.playerActiveIndex);
    const nextE = aliveNext(battle.enemyTeam, battle.enemyActiveIndex);

    battle.playerActiveIndex = nextP;
    battle.enemyActiveIndex = nextE;

    battle.lineHistory = battle.lineHistory.map(v => ({...v, active:false}));
    renderBattleHeader();

    if(nextP !== -1 && nextE !== -1){
      addLog(`${orderLabel(nextP)} ${battle.playerTeam[nextP].name} / ${orderLabel(nextE)} ${battle.enemyTeam[nextE].name} 登場。`);
      await wait(speedMap[speedMode].enter);
    }

    if(nextP === -1 || nextE === -1) break;
  }

  showBattleResult();
}

async function battleLoopFixed(){
  addLog("対面固定バトル開始。");
  battle.fixedPlayerWins = 0;
  battle.fixedEnemyWins = 0;

  for(let i=0;i<5;i++){
    const p = battle.playerTeam[i];
    const e = battle.enemyTeam[i];

    if(!p || !e) continue;

    battle.playerActiveIndex = i;
    battle.enemyActiveIndex = i;
    battle.matchCount += 1;
    battle.turn = 0;

    battle.lineHistory = battle.lineHistory.map(v => ({...v, active:false}));
    battle.lineHistory.push({
      playerIdx: i,
      enemyIdx: i,
      active: true
    });

    renderBattleHeader();
    addLog(`${orderLabel(i)}同士の対戦。`);
    showFlash(`${orderLabel(i)}戦`);
    await wait(speedMap[speedMode].intro);

    while(p.alive && e.alive){
      await processTurn();
    }

    if(p.alive && !e.alive){
      p.fixedWins += 1;
      battle.fixedPlayerWins += 1;
      addLog(`${p.name} が固定戦勝利。`);
    }else if(!p.alive && e.alive){
      e.fixedWins += 1;
      battle.fixedEnemyWins += 1;
      addLog(`${e.name} が固定戦勝利。`);
    }

    battle.lineHistory = battle.lineHistory.map(v => ({...v, active:false}));
    renderBattleHeader();
    await wait(speedMap[speedMode].enter);
  }

  showBattleResult();
}

function showBattleResult(){
  const summary = buildSummary();
  document.getElementById("resultTitle").textContent = summary.title;
  document.getElementById("resultSub").textContent = summary.sub;
  document.getElementById("summaryCard").textContent = summary.text;
  document.getElementById("replayPanel").textContent = buildReplayText();
  document.getElementById("battleActions").hidden = false;
}

async function startBattle(){
  if(team.length !== 5){
    alert("5体必要");
    return;
  }

  const enemyIds = makeEnemyTeam();

  battle = {
    playerTeam: team.map((id,i)=>cloneFighter(getChar(id), "player", i)),
    enemyTeam: enemyIds.map((id,i)=>cloneFighter(getChar(id), "enemy", i)),
    playerActiveIndex: 0,
    enemyActiveIndex: 0,
    lineHistory: [],
    logs: [],
    turn: 0,
    matchCount: 0,
    fixedPlayerWins: 0,
    fixedEnemyWins: 0
  };

  showScreen("screenBattle");
  document.getElementById("logPanel").innerHTML = "";
  document.getElementById("liveTicker").textContent = "対戦開始。";
  document.getElementById("battleActions").hidden = true;
  document.getElementById("mvpPanel").innerHTML = "";

  battle.lineHistory.push({
    playerIdx: 0,
    enemyIdx: 0,
    active: true
  });

  renderBattleHeader();
  await wait(speedMap[speedMode].start);

  if(battleMode === "fixed"){
    battleLoopFixed();
  }else{
    battleLoopSurvival();
  }
}

function rematch(){
  if(team.length !== 5) return;
  startBattle();
}

function setBattleSpeed(mode, el){
  speedMode = mode;
  document.getElementById("battleSpeedText").textContent =
    `速度：${mode === "normal" ? "普通" : mode === "fast" ? "速い" : "爆速"}`;
  document.querySelectorAll(".speedBtn").forEach(b => b.classList.remove("active"));
  if(el) el.classList.add("active");
}

function openPreviewBattleWithEnemy(playerId, enemyId){
  const ch = getChar(playerId);
  const enemy = getChar(enemyId);

  previewState = {
    player: cloneFighter(ch, "player", 0),
    enemy: cloneFighter(enemy, "enemy", 0),
    logs:[]
  };

  document.getElementById("previewOverlay").hidden = false;
  document.getElementById("previewTitle").textContent = `${ch.name} vs ${enemy.name}`;
  renderPreviewBattle();
}

function closePreviewBattle(){
  previewState = null;
  document.getElementById("previewOverlay").hidden = true;
}

function renderPreviewBadges(target, fighter, foe){
  const m = matchupText(fighter, foe);
  target.innerHTML = `
    <span class="infoBadge">試し</span>
    <span class="infoBadge badge-attr-${fighter.attr}">${attrLabel(fighter.attr)}</span>
    <span class="infoBadge ${m.cls}">${m.text}</span>
  `;
}

function renderPreviewBattle(){
  const p = previewState.player;
  const e = previewState.enemy;

  document.getElementById("previewPlayerCard").className = "fighterCard " + attrCardClass(p.attr);
  document.getElementById("previewEnemyCard").className = "fighterCard " + attrCardClass(e.attr);

  renderPreviewBadges(document.getElementById("previewPlayerBadges"), p, e);
  renderPreviewBadges(document.getElementById("previewEnemyBadges"), e, p);

  document.getElementById("previewPlayerName").textContent = p.name;
  document.getElementById("previewPlayerRole").textContent = p.role;
  document.getElementById("previewEnemyName").textContent = e.name;
  document.getElementById("previewEnemyRole").textContent = e.role;

  setImg(document.getElementById("previewPlayerImg"), p);
  setImg(document.getElementById("previewEnemyImg"), e);

  updateHpBar(document.getElementById("previewPlayerHpFill"), document.getElementById("previewPlayerHp"), p);
  updateHpBar(document.getElementById("previewEnemyHpFill"), document.getElementById("previewEnemyHp"), e);

  const logs = [];
  let turn = 0;
  while(p.alive && e.alive && turn < 20){
    turn++;
    const first = decideFirst(p, e);
    const second = first === p ? e : p;

    first.flags.isFirstThisTurn = true;
    const r1 = calcDamage(first, second);
    if(r1.text) logs.push(r1.text);
    second.currentHp -= r1.damage;
    logs.push(`${first.name} → ${second.name} ${r1.damage}`);
    if(second.currentHp <= 0){
      second.currentHp = 0;
      second.alive = false;
      break;
    }

    second.flags.isFirstThisTurn = false;
    const r2 = calcDamage(second, first);
    if(r2.text) logs.push(r2.text);
    first.currentHp -= r2.damage;
    logs.push(`${second.name} → ${first.name} ${r2.damage}`);
    if(first.currentHp <= 0){
      first.currentHp = 0;
      first.alive = false;
      break;
    }
  }

  updateHpBar(document.getElementById("previewPlayerHpFill"), document.getElementById("previewPlayerHp"), p);
  updateHpBar(document.getElementById("previewEnemyHpFill"), document.getElementById("previewEnemyHp"), e);

  let result = "互角";
  let summaryTone = "";

  if(p.alive && !e.alive){
    result = `${p.name} が有利`;
    summaryTone = "押し切れる相性";
  }else if(!p.alive && e.alive){
    result = `${e.name} が有利`;
    summaryTone = "この相手にはやや不利";
  }else{
    result = p.currentHp >= e.currentHp ? `${p.name} がやや有利` : `${e.name} がやや有利`;
    summaryTone = "大きな差はない";
  }

  document.getElementById("previewSummary").textContent =
    `簡易評価\n${result}\n${summaryTone}`;

  document.getElementById("previewLog").textContent =
    `戦闘ログ\n` + logs.slice(0,6).join("\n");
}

window.addEventListener("resize",()=>{
  if(battle) drawStatusLines();
});

goTitle();
renderAll();
</script>
</body>
</html>
